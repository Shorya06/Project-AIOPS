server:
  port: 8082

spring:
  application:
    name: healing-service

  datasource:
    url: jdbc:postgresql://localhost:5432/aiops_db
    username: aiops_user
    password: aiops_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

gemini:
  api-key: ${GEMINI_API_KEY:mock-key}
  model: ${GEMINI_MODEL:gemini-2.5-flash}

healing:
  policy:
    max-replicas: 5
    max-memory-limit: 2048Mi
    feedback-delay-seconds: 60
