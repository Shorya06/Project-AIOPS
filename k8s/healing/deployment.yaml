apiVersion: apps/v1
kind: Deployment
metadata:
  name: healing-service
  namespace: aiops
  labels:
    app: healing-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: healing-service
  template:
    metadata:
      labels:
        app: healing-service
    spec:
      containers:
        - name: healing-service
          image: projectaiops-healing-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-secret
                  key: gemini-api-key
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:8083"
            - name: POSTGRES_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: database
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/$(POSTGRES_DB_NAME)"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 10
