apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: aiops
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'namespace', 'pod']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'webhook-receiver'

    receivers:
      - name: 'webhook-receiver'
        webhook_configs:
          - url: 'http://k8s-observer-service:8084/api/v1/alerts'
            send_resolved: true
