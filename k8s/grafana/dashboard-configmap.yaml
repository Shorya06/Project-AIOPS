apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: aiops
data:
  dashboard-1-aiops-overview.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "datasource",
              "uid": "grafana"
            },
            "enable": true,
            "hide": true,
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": false,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": 1,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "collapsed": false,
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "title": "Gateway Status",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-ds"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus-ds"
              },
              "editorMode": "code",
              "expr": "up{job=\"gateway-service\"}",
              "legendFormat": "Gateway State",
              "range": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": {
                      "text": "OFFLINE",
                      "color": "red"
                    },
                    "1": {
                      "text": "ONLINE",
                      "color": "green"
                    }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            }
          }
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "id": 2,
          "title": "Platform Overall Health",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-ds"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus-ds"
              },
              "editorMode": "code",
              "expr": "sum(up)",
              "legendFormat": "Healthy Components",
              "range": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 3
                  },
                  {
                    "color": "green",
                    "value": 5
                  }
                ]
              }
            }
          }
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 0
          },
          "id": 3,
          "title": "Active Alerts Count",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-ds"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus-ds"
              },
              "editorMode": "code",
              "expr": "sum(alerts{alertstate=\"firing\"}) or vector(0)",
              "legendFormat": "Alerts Firing",
              "range": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 3
                  }
                ]
              }
            }
          }
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 0
          },
          "id": 4,
          "title": "Running Microservices",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-ds"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus-ds"
              },
              "editorMode": "code",
              "expr": "sum(up{job=~\"gateway-service|transaction-service|healing-service|notification-service|k8s-observer-service\"})",
              "legendFormat": "Online Services",
              "range": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 4
                  },
                  {
                    "color": "green",
                    "value": 5
                  }
                ]
              }
            }
          }
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 4
          },
          "id": 5,
          "title": "Healings Operations - Today",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-ds"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus-ds"
              },
              "editorMode": "code",
              "expr": "sum(increase(ai_healing_total[24h])) or vector(0)",
              "legendFormat": "Self-Healings Initiated",
              "range": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              }
            }
          }
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 4
          },
          "id": 6,
          "title": "Active AI Model",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-ds"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus-ds"
              },
              "editorMode": "code",
              "expr": "vector(1)",
              "legendFormat": "Gemini-3.5-Flash",
              "range": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "1": {
                      "text": "Gemini 3.5 Flash",
                      "color": "blue"
                    }
                  }
                }
              ]
            }
          }
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "tags": [
        "aiops",
        "overview"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": true,
              "value": "aiops"
            },
            "hide": 0,
            "includeAll": false,
            "label": "Namespace",
            "multi": false,
            "name": "namespace",
            "options": [],
            "query": "label_values(up, namespace)",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "sort": 1,
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus-ds"
            }
          }
        ]
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "AIOps Overview",
      "version": 1
    }
    
  dashboard-2-gateway-metrics.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "datasource",
              "uid": "grafana"
            },
            "enable": true,
            "hide": true,
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": false,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": 2,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "collapsed": false,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "title": "CPU Usage (%)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-ds"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus-ds"
              },
              "editorMode": "code",
              "expr": "system_cpu_usage{job=\"$application\"} * 100",
              "legendFormat": "{{job}} - CPU",
              "range": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth"
              },
              "unit": "percent"
            }
          }
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "title": "JVM Heap Memory (MB)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-ds"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus-ds"
              },
              "editorMode": "code",
              "expr": "jvm_memory_used_bytes{job=\"$application\",area=\"heap\"} / 1024 / 1024",
              "legendFormat": "{{job}} - Heap Used",
              "range": true,
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus-ds"
              },
              "editorMode": "code",
              "expr": "jvm_memory_max_bytes{job=\"$application\",area=\"heap\"} / 1024 / 1024",
              "legendFormat": "{{job}} - Heap Max",
              "range": true,
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line"
              },
              "unit": "decbytes"
            }
          }
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "title": "JVM Active Threads",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-ds"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus-ds"
              },
              "editorMode": "code",
              "expr": "jvm_threads_live_threads{job=\"$application\"}",
              "legendFormat": "{{job}} - Threads",
              "range": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line"
              },
              "unit": "short"
            }
          }
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 8,
            "y": 8
          },
          "id": 4,
          "title": "GC Total Pause Duration (ms)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-ds"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus-ds"
              },
              "editorMode": "code",
              "expr": "sum(increase(jvm_gc_pause_seconds_sum{job=\"$application\"}[5m])) * 1000",
              "legendFormat": "{{job}} - GC Pause Time",
              "range": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line"
              },
              "unit": "ms"
            }
          }
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 16,
            "y": 8
          },
          "id": 5,
          "title": "Request Rate & Latency",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus-ds"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus-ds"
              },
              "editorMode": "code",
              "expr": "sum(rate(http_server_requests_seconds_count{job=\"$application\"}[5m]))",
              "legendFormat": "Requests/sec",
              "range": true,
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus-ds"
              },
              "editorMode": "code",
              "expr": "(sum(rate(http_server_requests_seconds_sum{job=\"$application\"}[5m])) / sum(rate(http_server_requests_seconds_count{job=\"$application\"}[5m]))) * 1000",
              "legendFormat": "Avg Response Time (ms)",
              "range": true,
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line"
              }
            }
          }
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "tags": [
        "aiops",
        "gateway"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": true,
              "value": "gateway-service"
            },
            "hide": 0,
            "includeAll": false,
            "label": "Application",
            "multi": false,
            "name": "application",
            "options": [],
            "query": "label_values(up, job)",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "sort": 1,
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus-ds"
            }
          }
        ]
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Gateway Metrics",
      "version": 1
    }
    
